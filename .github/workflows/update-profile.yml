name: Update Profile Assets

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: zm99by
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark


      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.NEW_MTOKEN }}
          user: zm99by
          template: terminal
          filename: github-metrics.svg
          output_action: none
          
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Warsaw
          config_twemoji: yes
          
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_ignored: projects, member, job
          

          plugin_habits: yes
          plugin_habits_from: 500
          plugin_habits_days: 14
          plugin_habits_charts_type: classic

          plugin_code: yes
          plugin_introduction: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_lines: yes
          plugin_notable: yes
          plugin_people: yes
          plugin_stargazers: yes
          plugin_stars: yes
          plugin_topics: yes
          repositories_forks: yes

      - name: Prepare Assets
        run: |
          mkdir -p dist
          mv github-metrics.svg dist/ 2>/dev/null || true

      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update profile assets [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.NEW_MTOKEN }}
